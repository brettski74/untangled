# Demo / fixture class for the mapping layer (not a real INC/CHG/User).
# Edit definitions here, then run `make models`. Schema sync + CRUD live in
# untangled.persistence (make db-up / make test).
name: demo-item
display-name: Demo Item
description: >
  Minimal fixture class used to prove YAML definitions through Pydantic/Zod
  generation and PostgreSQL persistence. Not a product ticket type.
attributes:
  title:
    type: string
    required: true
  summary:
    type: string
    required: false
  is-active:
    type: boolean
    required: true
  quantity:
    type: integer
    required: true
  unit-price:
    type: float
    required: false
  fixed-amount:
    type: decimal
    required: true
  due-at:
    type: datetime
    required: false
