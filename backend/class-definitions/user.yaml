# First-class User identity (M1 auth). Internal for API admin CRUD until a later ticket.
name: user
display-name: User
description: >
  Authenticated principal for login and audit stamps. Password hashes are for
  server use only and must never appear in API responses.
attributes:
  username:
    type: string
    required: true
    unique: true
  password-hash:
    type: string
    required: true
  display-name:
    type: string
    required: true
  is-active:
    type: boolean
    required: true
